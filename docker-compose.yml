version: "3.8"

services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Server configuration
      - HOST=0.0.0.0
      - PORT=8080
      # Studio Chat API
      - STUDIO_CHAT_BASE_URL=${STUDIO_CHAT_BASE_URL}
      - STUDIO_CHAT_API_KEY=${STUDIO_CHAT_API_KEY}
      # Intercom
      - INTERCOM_ACCESS_TOKEN=${INTERCOM_ACCESS_TOKEN}
      - INTERCOM_WEBHOOK_SECRET=${INTERCOM_WEBHOOK_SECRET:-}
      # Configuration
      - CONFIG_PATH=/app/config.yaml
    volumes:
      # Mount your configuration file
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: For development with auto-reload
  bridge-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - RELOAD=true
      - STUDIO_CHAT_BASE_URL=${STUDIO_CHAT_BASE_URL}
      - STUDIO_CHAT_API_KEY=${STUDIO_CHAT_API_KEY}
      - INTERCOM_ACCESS_TOKEN=${INTERCOM_ACCESS_TOKEN}
      - INTERCOM_WEBHOOK_SECRET=${INTERCOM_WEBHOOK_SECRET:-}
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./src:/app/src:ro
      - ./config.yaml:/app/config.yaml:ro
    profiles:
      - dev
